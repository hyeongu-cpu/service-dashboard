  var today = new Date(kstMs).toISOString().slice(0, 10);
  var KEY_DAY = 'finda_service_dashboard_last_auth_day';
  var lastDay = localStorage.getItem(KEY_DAY);

    var box = document.getElementById('staticrypt-remember');
    if (box && !box.checked) box.checked = true;
  }

  } else { checkBox(); }

                    isRememberChecked = document.getElementById("staticrypt-remember").checked;

                const { isSuccessful } = await staticrypt.handleDecryptionOfPage(password, isRememberChecked);

                if (!isSuccessful) {
                    alert(templateError);
                }
            });
        </script>
